name: release

on:
  push:
    tags:
      - '[0-9]+.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: publish ${{ matrix.rid }} (AOT)
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            platform: x64
            rust_target: x86_64-pc-windows-msvc
          # Only win-x64 ships. To add a platform, append a matrix entry, e.g.
          #   - rid: win-x86
          #     platform: x86
          #     rust_target: i686-pc-windows-msvc
          #   - rid: win-arm64
          #     platform: ARM64
          #     rust_target: aarch64-pc-windows-msvc
          # Note: AOT cross-compile to arm64 may require a windows-11-arm runner;
          # the Rust updater also needs the ARM64 MSVC tools on that runner.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          $ver = $tag -replace '^v',''
          if ($ver -notmatch '^\d+(\.\d+){0,3}$') { $ver = '0.0.0' }
          "version=$ver" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved version: $ver (from tag $tag)"

      # No separate `dotnet restore` step: PublishAot must be set at restore time
      # for ILCompiler to be pulled in. See build.yml for details.
      - name: Publish (${{ matrix.rid }}, AOT)
        run: >
          dotnet publish XrayUI-dev.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:Platform=${{ matrix.platform }}
          -p:SelfContained=true
          -p:PublishAot=true
          -p:PublishTrimmed=true
          -p:PublishSingleFile=false
          -p:PublishReadyToRun=false
          -p:WindowsAppSDKSelfContained=false
          -p:CopyOutputSymbolsToPublishDirectory=false
          -p:Version=${{ steps.ver.outputs.version }}
          -p:BuildingForCI=true

      - name: Install Rust (${{ matrix.rust_target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build Updater (${{ matrix.rust_target }})
        run: >
          cargo build --release
          --manifest-path updater-rs/Cargo.toml
          --bin xrayui-updater
          --target ${{ matrix.rust_target }}

      - name: Bundle updater into staging
        shell: pwsh
        run: |
          $publishDir = "bin/Release/net10.0-windows10.0.19041.0/${{ matrix.rid }}/publish"
          $updaterExe = "updater-rs/target/${{ matrix.rust_target }}/release/xrayui-updater.exe"
          if (-not (Test-Path $updaterExe)) {
            Write-Host "::error::Updater build did not produce $updaterExe"
            exit 1
          }
          # Cargo can't emit a dotted file name; copy to the contract filename that
          # UpdateService.cs and already-released versions expect.
          Copy-Item $updaterExe -Destination "$publishDir/XrayUI.Updater.exe" -Force
          Write-Host "Bundled XrayUI.Updater.exe (Rust) into $publishDir"

      - name: Verify AOT exe produced
        shell: pwsh
        run: |
          $publishDir = "bin/Release/net10.0-windows10.0.19041.0/${{ matrix.rid }}/publish"
          $exe = "$publishDir/XrayUI-dev.exe"
          Write-Host "Listing $publishDir :"
          if (Test-Path $publishDir) {
            Get-ChildItem -Recurse $publishDir | ForEach-Object { $_.FullName }
          } else {
            Write-Host "(publish dir does not exist)"
          }
          if (-not (Test-Path $exe)) {
            Write-Host "::error::Publish did not produce $exe"
            exit 1
          }
          Write-Host "OK: AOT exe found at $exe ($((Get-Item $exe).Length) bytes)"

      - name: Pack zip
        shell: pwsh
        run: |
          $publishDir = "bin/Release/net10.0-windows10.0.19041.0/${{ matrix.rid }}/publish"
          $zipName = "XrayUI-${{ matrix.rid }}.zip"
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipName -CompressionLevel Optimal
          Write-Host "Created $zipName ($((Get-Item $zipName).Length) bytes)"

      - name: Generate SHA256
        shell: pwsh
        run: |
          $zip = "XrayUI-${{ matrix.rid }}.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          # Standard sha256sum format: "<hash>  <filename>" (two spaces, no newline).
          [System.IO.File]::WriteAllText("$zip.sha256", "$hash  $zip", [System.Text.Encoding]::ASCII)
          Write-Host "Wrote $zip.sha256 = $hash"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: XrayUI-${{ matrix.rid }}
          path: XrayUI-${{ matrix.rid }}.zip*
          retention-days: 14
          if-no-files-found: error

  release:
    name: create GitHub release
    needs: publish
    runs-on: ubuntu-latest
    # Only create a Release on real tag pushes. workflow_dispatch is for testing
    # the publish flow only; download the zip artifacts from the run page to verify.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten release files
        run: |
          mkdir -p release-files
          find artifacts \( -name '*.zip' -o -name '*.sha256' \) -exec mv {} release-files/ \;
          ls -la release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*.zip
            release-files/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
